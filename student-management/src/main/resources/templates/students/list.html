<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Student List</title>
</head>
<body>

<div layout:fragment="content">

    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <h2 class="fw-bold mb-1">
                <i class="bi bi-people-fill me-2 text-primary"></i>Students
            </h2>
            <p class="text-muted mb-0" th:text="|Total: ${totalStudents} students|">Total: 0 students</p>
        </div>
        <a th:href="@{/students/add}" class="btn btn-primary fw-semibold">
            <i class="bi bi-plus-circle me-2"></i>Add Student
        </a>
    </div>

    <!-- Flash Messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}">Success!</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}">Error!</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Search Bar -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-3">
            <form th:action="@{/students}" method="get" class="d-flex gap-2">
                <input type="text" name="keyword" th:value="${keyword}"
                       class="form-control" placeholder="Search by name or email...">
                <button type="submit" class="btn btn-outline-primary fw-semibold">
                    <i class="bi bi-search me-1"></i>Search
                </button>
                <a th:href="@{/students}" class="btn btn-outline-secondary">
                    <i class="bi bi-x-circle me-1"></i>Clear
                </a>
            </form>
        </div>
    </div>

    <!-- Students Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-primary">
                        <tr>
                            <th class="ps-3">#</th>
                            <th>
                                <a th:href="@{/students(sortField='firstName', sortDir=${reverseSortDir})}"
                                   class="text-decoration-none text-dark fw-bold d-inline-flex align-items-center gap-1">
                                    Name
                                    <i th:class="${sortField == 'firstName'}
                                        ? (${sortDir == 'asc'} ? 'bi bi-sort-up' : 'bi bi-sort-down')
                                        : 'bi bi-arrow-down-up'"></i>
                                </a>
                            </th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Course</th>
                            <th class="text-center pe-3">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="student, iterStat : ${students}">

                            <td class="text-muted ps-3" th:text="${iterStat.count}">1</td>

                            <!-- Name + Avatar -->
                            <td>
                                <div class="d-flex align-items-center gap-3">
                                    <!-- Avatar circle using Bootstrap -->
                                    <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center fw-bold flex-shrink-0"
                                         style="width:40px; height:40px; font-size:0.85rem;"
                                         th:text="${#strings.substring(student.firstName,0,1) + #strings.substring(student.lastName,0,1)}">JD</div>
                                    <div>
                                        <div class="fw-semibold" th:text="${student.fullName}">John Doe</div>
                                        <small class="text-muted"
                                               th:text="${#temporals.format(student.createdAt, 'dd MMM yyyy')}">01 Jan 2024</small>
                                    </div>
                                </div>
                            </td>

                            <td th:text="${student.email}">email@example.com</td>
                            <td th:text="${student.phone} ?: '—'">+91 9999999999</td>

                            <td>
                                <span class="badge rounded-pill bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25 fw-normal"
                                      th:text="${student.course}">Course</span>
                            </td>

                            <!-- Action Buttons -->
                            <td class="text-center pe-3">
                                <a th:href="@{/students/edit/{id}(id=${student.id})}"
                                   class="btn btn-sm btn-outline-warning me-1" title="Edit">
                                    <i class="bi bi-pencil-fill"></i>
                                </a>
                                <button type="button" class="btn btn-sm btn-outline-danger btn-delete" title="Delete"
                                        th:data-url="@{/students/delete/{id}(id=${student.id})}"
                                        th:data-name="${student.fullName}">
                                    <i class="bi bi-trash-fill"></i>
                                </button>
                            </td>
                        </tr>

                        <!-- Empty State -->
                        <tr th:if="${#lists.isEmpty(students)}">
                            <td colspan="6" class="text-center py-5 text-muted">
                                <i class="bi bi-inbox fs-1 d-block mb-2 text-secondary"></i>
                                <p class="mb-1">No students found.</p>
                                <a th:href="@{/students/add}" class="btn btn-sm btn-primary mt-1">
                                    <i class="bi bi-plus-circle me-1"></i>Add one now
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}" class="mt-4" aria-label="Page navigation">
        <ul class="pagination justify-content-center mb-2">

            <!-- Previous -->
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/students(page=${currentPage - 1}, sortField=${sortField}, sortDir=${sortDir}, keyword=${keyword})}">
                    <i class="bi bi-chevron-left"></i> Prev
                </a>
            </li>

            <!-- Page Numbers -->
            <li th:each="i : ${#numbers.sequence(1, totalPages)}"
                class="page-item" th:classappend="${currentPage == i} ? 'active'">
                <a class="page-link"
                   th:href="@{/students(page=${i}, sortField=${sortField}, sortDir=${sortDir}, keyword=${keyword})}"
                   th:text="${i}">1</a>
            </li>

            <!-- Next -->
            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/students(page=${currentPage + 1}, sortField=${sortField}, sortDir=${sortDir}, keyword=${keyword})}">
                    Next <i class="bi bi-chevron-right"></i>
                </a>
            </li>

        </ul>

        <p class="text-center text-muted small">
            Showing page <strong th:text="${currentPage}">1</strong> of
            <strong th:text="${totalPages}">1</strong>
            (<span th:text="${totalItems}">0</span> total records)
        </p>
    </nav>

</div>

    <script>
        document.querySelectorAll('.btn-delete').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var url  = this.getAttribute('data-url');
                var name = this.getAttribute('data-name');
                if (confirm('Are you sure you want to delete student: ' + name + '?\n\nThis action cannot be undone!')) {
                    window.location.href = url;
                }
            });
        });
    </script>
</body>
</html>
